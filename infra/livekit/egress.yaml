# LiveKit Egress — room-composite MP4 recording → Supabase Storage (S3-compatible).
# Generate the S3 access/secret in Supabase dashboard → Storage → S3 access keys,
# then export SUPABASE_S3_ACCESS_KEY / SUPABASE_S3_SECRET_KEY before:
#   docker compose --profile recording up -d
log_level: info
api_key: devkey
api_secret: secret
ws_url: ws://livekit:7880
redis:
  address: redis:6379
s3:
  access_key: ${SUPABASE_S3_ACCESS_KEY}
  secret: ${SUPABASE_S3_SECRET_KEY}
  region: ap-southeast-1
  endpoint: https://nwbzqmeqmqfajqkpuapr.storage.supabase.co/storage/v1/s3
  bucket: recordings
  force_path_style: true
